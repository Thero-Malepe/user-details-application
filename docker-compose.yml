services:
  postgres:
    image: postgres:18
    container_name: userdetails-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password1
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  api:
    build: ./UserDetailsApi
    container_name: userdetails-api
    ports:
      - "5066:5066"
    environment:
      ASPNETCORE_URLS: http://+:5066
      ConnectionStrings__UserDetailsDb: "Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=Password1"
    depends_on:
      - postgres

  ui:
    build: ./UserDetailsFrontend
    container_name: userdetails-ui
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pgdata: