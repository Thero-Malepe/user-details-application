<div class="card">   
    <div class="card-header">
        <h3>Register</h3>
    </div>
    <div class="card-body">
        <form [formGroup]="form">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="name@example.com"
                required
              >
            </div>
            <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="text-danger">
                    Email is required
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                class="form-control"
                id="password"
                type="password"
                formControlName="password"
                required
              >
            </div>
            <div *ngIf="form.get('password')?.touched" class="text-danger">
                    password is required
            </div>
             <div *ngIf="form.get('password')?.invalid" class="text-danger">
                    Password length must be between 8 and 15 characters
            </div>

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input
                    class="form-control"
                    type="text"
                    id="firstName"
                    formControlName="firstName"
                    required
                />
            </div>
            <div *ngIf="form.get('firstName')?.touched && form.get('firstName')?.invalid" class="text-danger">
                    FirstName is required
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input
                    class="form-control"
                    id="lastName"
                    formControlName="lastName"
                    required
                >
            </div>
            <div *ngIf="form.get('lastName')?.touched && form.get('lastName')?.invalid" class="text-danger">
                    LastName is required
            </div>
            <br>
            <div>
                <p>Already have an account?</p>
                <button type="button" class="btn btn-link" (click)="toggle()">Login</button>
            </div>

            <div class="card-footer text-right">
                <button type="submit" class="btn btn-primary" (click)="register()">Register</button>
                <!-- <button  (click)="cancel()"  class="btn btn-outline-warning mx-3">Cancel</button> -->
            </div>
        </form>          
    </div>
</div>
