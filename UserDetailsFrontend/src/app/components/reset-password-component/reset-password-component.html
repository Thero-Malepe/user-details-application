<app-loader></app-loader>
<div class="card">   
    <div class="card-header">
        <h3>Reset Password</h3>
    </div>
    <div class="card-body">
        <form [formGroup]="form">
            <div class="form-group">
              <label for="password">New Password</label>
              <input
                class="form-control"
                id="password"
                type="password"
                formControlName="password"
                required
              >
            </div>
            @if( form.get('password')?.touched && form.get('password')?.value == '' )
            {
                <div class="text-danger">
                    Password is required
                </div>
            }

            @if(form.get('password')?.invalid)
            {
                <div class="text-danger">
                    Password length must be between 8 and 15 characters
                </div>
            }           
             
            <div class="d-flex">
                <button type="button" class="btn btn-link" (click)="toggle()">Login?</button>
            </div>

            <div class="card-footer text-right">
                <button type="submit" class="btn btn-primary" (click)="reset()">Reset Password</button>
            </div>
        </form>          
    </div>
</div>
