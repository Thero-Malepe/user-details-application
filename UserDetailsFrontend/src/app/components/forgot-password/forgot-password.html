<app-loader></app-loader>
<div class="card">   
    <div class="card-header">
        <h3>Forgot Password</h3>
    </div>
    <div class="card-body">
        <form [formGroup]="form">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="name@example.com"
                required
              >
            </div>

            @if(form.get('email')?.touched && form.get('email')?.invalid)
            {
                <div class="text-danger">
                    Email is required
                </div>
            }
            
            <br>
            <div class="d-flex">
                <button type="button" class="btn btn-link" (click)="toggle()">Register here?</button>
            </div>

            <div class="card-footer text-right">
                <button type="submit" class="btn btn-primary" (click)="SendEmail()">Send Reset Email</button>
            </div>
        </form>          
    </div>
</div>
