<div class="card">   
    <div class="card-header">
        <h3>Login</h3>
    </div>
    <div class="card-body">
        <form [formGroup]="form">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="name@example.com"
                required
              >
            </div>
            
            @if(form.get('email')?.touched && form.get('email')?.invalid)
            {
                <div class="text-danger">
                    Email is required
                </div>
            }

            <div class="form-group">
              <label for="password">Password</label>
              <input
                class="form-control"
                id="password"
                type="password"
                formControlName="password"
                required
              >
            </div>
            
            @if(form.get('password')?.touched && form.get('password')?.value == '')
            {
                <div class="text-danger">
                    Password is required
                </div>
            }

            @if(form.get('password')?.invalid)
            {
                <div class="text-danger">
                    Password length must be between 8 and 15 characters
                </div>
            }
             
            <div class="d-flex">
                <button type="button" class="btn btn-link" (click)="toggle()">Register here?</button>
            </div>
            <div class="d-flex">
                <button type="button" class="btn btn-link" (click)="forgot()">Forgot password?</button>
            </div>

            <div class="card-footer text-right">
                <button type="submit" class="btn btn-primary" (click)="login()">Login</button>
            </div>
        </form>          
    </div>
</div>
