
<div class="app-container">
  <nav class="navbar sticky-top bg-primary py-2" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand"><h3 routerLink="/home" class="clickable">📋 {{title}}</h3></a>
        @if(isLoggedIn)
        {
          <div class="nav-right">
            <span class="init-app">{{userInitials}}</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
              <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Options</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
              </div>
              <div class="offcanvas-body">
                <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                  <li class="nav-item">
                    <a class="nav-link clickable" (click)="logout()">Logout</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link clickable" (click)="deleteAccount()">Delete Account</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>          
        }        
      </div>
    </nav>
  
    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  
    <footer class="bg-primary border-bottom" data-bs-theme="dark">
      <div class="container text-center py-3 text-white">
        <p>&copy;{{ currentYear }} User Details. Created using Angular {{ angularVersion }}</p>
      </div>
    </footer>
  </div>
